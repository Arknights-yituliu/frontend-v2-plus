name: Build and Deploy to Tencent COS

on:
  push:
    branches:
      - 'main'
      - 'dev'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      artifact-id: ${{ steps.upload-artifacts.outputs.artifact-id }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node_modules-

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Project
        run: npm run build

      - name: Upload Artifacts
        id: upload-artifacts
        uses: actions/upload-artifact@v6
        with:
          path: dist
          name: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
          path: dist

      - name: Restore COSCLI from cache
        id: cache-coscli
        uses: actions/cache/restore@v4
        with:
          path: ./coscli
          key: coscli-v1.0.7-linux-amd64

      - name: Download COSCLI
        if: ${{ steps.cache-coscli.outputs.cache-hit != 'true' }}
        run: |
          wget -O ./coscli https://github.com/tencentyun/coscli/releases/download/v1.0.7/coscli-v1.0.7-linux-amd64
          chmod 755 ./coscli

      - name: Save COSCLI to cache
        if: ${{ steps.cache-coscli.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ./coscli
          key: coscli-v1.0.7-linux-amd64

      - name: Set deploy env (main)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "TARGET_BUCKET=${{ secrets.COS_BUCKET_PROD }}" >> $GITHUB_ENV
          echo "CDN_URL=https://ark.yituliu.cn/" >> $GITHUB_ENV

      - name: Set deploy env (dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "TARGET_BUCKET=${{ secrets.COS_BUCKET }}" >> $GITHUB_ENV
          echo "CDN_URL=https://dev.yituliu.cn/" >> $GITHUB_ENV

      - name: Deploy to COS
        # dev 和 main 分支使用不同的 Bucket
        run: |
          ./coscli --version
          ./coscli sync ./dist cos://$TARGET_BUCKET/ \
            --recursive \
            --delete \
            --force \
            --init-skip=true \
            --secret-id=${{ secrets.COS_SECRET_ID }} \
            --secret-key=${{ secrets.COS_SECRET_KEY }} \
            --endpoint=cos.${{ secrets.COS_REGION }}.myqcloud.com

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Tencent CLI
        run: |
          pip install tccli
          tccli --version

      - name: Refresh CDN
        # dev 和 main 分支使用不同的 CDN 域名
        run: |
          tccli cdn PurgePathCache \
            --secretId ${{ secrets.COS_SECRET_ID }} \
            --secretKey ${{ secrets.COS_SECRET_KEY }} \
            --FlushType 'flush' \
            --Paths "[\"$CDN_URL\"]"
